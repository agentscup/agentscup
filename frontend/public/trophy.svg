<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" style="image-rendering:pixelated">
  <!-- Globe/Sphere top -->
  <rect x="24" y="4" width="16" height="2" fill="#FFD700"/>
  <rect x="22" y="6" width="20" height="2" fill="#FFD700"/>
  <rect x="20" y="8" width="24" height="4" fill="#FFEC80"/>
  <rect x="20" y="12" width="24" height="4" fill="#FFD700"/>
  <rect x="21" y="16" width="22" height="2" fill="#E8A317"/>
  <rect x="22" y="18" width="20" height="2" fill="#B8960C"/>
  <rect x="24" y="20" width="16" height="2" fill="#B8960C"/>
  <!-- Sphere highlights -->
  <rect x="22" y="6" width="8" height="2" fill="#FFF4B0"/>
  <rect x="21" y="8" width="6" height="3" fill="#FFF4B0"/>
  <rect x="23" y="8" width="3" height="2" fill="#FFFFFF" opacity="0.5"/>
  <!-- Outline for globe -->
  <rect x="23" y="3" width="18" height="1" fill="#B8860B"/>
  <rect x="21" y="4" width="2" height="2" fill="#B8860B"/>
  <rect x="41" y="4" width="2" height="2" fill="#B8860B"/>
  <rect x="19" y="6" width="2" height="2" fill="#B8860B"/>
  <rect x="43" y="6" width="2" height="2" fill="#B8860B"/>
  <rect x="18" y="8" width="2" height="8" fill="#B8860B"/>
  <rect x="44" y="8" width="2" height="8" fill="#B8860B"/>
  <rect x="19" y="16" width="2" height="2" fill="#B8860B"/>
  <rect x="43" y="16" width="2" height="2" fill="#B8860B"/>
  <rect x="20" y="18" width="2" height="2" fill="#B8860B"/>
  <rect x="42" y="18" width="2" height="2" fill="#B8860B"/>
  <rect x="22" y="20" width="2" height="2" fill="#B8860B"/>
  <rect x="40" y="20" width="2" height="2" fill="#B8860B"/>
  <!-- Narrow stem -->
  <rect x="26" y="22" width="12" height="2" fill="#FFD700"/>
  <rect x="28" y="24" width="8" height="4" fill="#FFD700"/>
  <rect x="29" y="24" width="6" height="4" fill="#FFEC80"/>
  <rect x="28" y="24" width="2" height="4" fill="#B8960C"/>
  <rect x="27" y="28" width="10" height="2" fill="#FFD700"/>
  <!-- Green platform -->
  <rect x="22" y="30" width="20" height="4" fill="#2d8a4e"/>
  <rect x="24" y="30" width="16" height="2" fill="#3cb371"/>
  <rect x="21" y="30" width="1" height="4" fill="#1a6b35"/>
  <rect x="42" y="30" width="1" height="4" fill="#1a6b35"/>
  <!-- Wide base -->
  <rect x="18" y="34" width="28" height="4" fill="#FFD700"/>
  <rect x="20" y="34" width="24" height="2" fill="#FFF4B0"/>
  <rect x="22" y="34" width="8" height="1" fill="#FFFFFF" opacity="0.3"/>
  <rect x="16" y="38" width="32" height="4" fill="#FFD700"/>
  <rect x="18" y="38" width="28" height="2" fill="#FFEC80"/>
  <rect x="16" y="42" width="32" height="2" fill="#B8960C"/>
  <!-- Base outline -->
  <rect x="17" y="33" width="30" height="1" fill="#B8860B"/>
  <rect x="15" y="37" width="34" height="1" fill="#B8860B"/>
  <rect x="15" y="44" width="34" height="1" fill="#8B6914"/>
  <!-- Green bottom band -->
  <rect x="20" y="45" width="24" height="3" fill="#2d8a4e"/>
  <rect x="22" y="45" width="20" height="1" fill="#3cb371"/>
  <!-- Sparkle stars - top left -->
  <rect x="10" y="8" width="4" height="4" fill="#FFD700" opacity="0.9"/>
  <rect x="11" y="7" width="2" height="6" fill="#FFF4B0" opacity="0.8"/>
  <rect x="9" y="9" width="6" height="2" fill="#FFF4B0" opacity="0.8"/>
  <!-- Sparkle - top right -->
  <rect x="50" y="6" width="4" height="4" fill="#FFD700" opacity="0.9"/>
  <rect x="51" y="5" width="2" height="6" fill="#FFF4B0" opacity="0.8"/>
  <rect x="49" y="7" width="6" height="2" fill="#FFF4B0" opacity="0.8"/>
  <!-- Sparkle - mid left -->
  <rect x="8" y="20" width="3" height="3" fill="#FFD700" opacity="0.7"/>
  <rect x="9" y="19" width="1" height="5" fill="#FFF4B0" opacity="0.6"/>
  <rect x="7" y="21" width="5" height="1" fill="#FFF4B0" opacity="0.6"/>
  <!-- Sparkle - mid right -->
  <rect x="53" y="16" width="3" height="3" fill="#FFD700" opacity="0.7"/>
  <rect x="54" y="15" width="1" height="5" fill="#FFF4B0" opacity="0.6"/>
  <rect x="52" y="17" width="5" height="1" fill="#FFF4B0" opacity="0.6"/>
  <!-- Small sparkles -->
  <rect x="12" y="30" width="2" height="2" fill="#FFD700" opacity="0.5"/>
  <rect x="50" y="26" width="2" height="2" fill="#FFD700" opacity="0.5"/>
</svg>
