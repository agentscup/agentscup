<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" style="image-rendering:pixelated" shape-rendering="crispEdges">
  <!-- Background -->
  <rect width="400" height="400" fill="#061206"/>
  <rect x="0" y="0" width="400" height="4" fill="#1E8F4E"/>
  <rect x="0" y="396" width="400" height="4" fill="#1E8F4E"/>
  <rect x="0" y="0" width="4" height="400" fill="#1E8F4E"/>
  <rect x="396" y="0" width="4" height="400" fill="#1E8F4E"/>

  <!-- Gold border frame -->
  <rect x="20" y="20" width="360" height="360" fill="none" stroke="#FFD700" stroke-width="4"/>
  <rect x="26" y="26" width="348" height="348" fill="none" stroke="#B8860B" stroke-width="2"/>

  <!-- Title -->
  <g transform="translate(200, 60)" font-family="monospace" text-anchor="middle">
    <text y="0" font-size="14" fill="#FFD700" letter-spacing="4">AGENTS CUP</text>
    <text y="24" font-size="20" fill="#FFD700" font-weight="bold" letter-spacing="3">TOP HOLDER</text>
  </g>

  <!-- Trophy (scaled up from existing pixel art) -->
  <g transform="translate(120, 120) scale(5)">
    <!-- Cup top -->
    <rect x="4" y="0" width="24" height="2" fill="#FFD700"/>
    <rect x="2" y="2" width="28" height="2" fill="#FFD700"/>
    <rect x="0" y="4" width="32" height="8" fill="#FFEC80"/>
    <rect x="0" y="12" width="32" height="6" fill="#FFD700"/>
    <rect x="1" y="18" width="30" height="2" fill="#E8A317"/>
    <rect x="2" y="20" width="28" height="2" fill="#B8960C"/>
    <rect x="4" y="22" width="24" height="2" fill="#B8960C"/>
    <!-- Highlights -->
    <rect x="2" y="4" width="8" height="2" fill="#FFF4B0"/>
    <rect x="1" y="6" width="6" height="3" fill="#FFF4B0"/>
    <rect x="3" y="6" width="3" height="2" fill="#FFFFFF" opacity="0.6"/>
    <!-- Stem -->
    <rect x="6" y="24" width="20" height="2" fill="#FFD700"/>
    <rect x="8" y="26" width="16" height="4" fill="#FFD700"/>
    <!-- Base -->
    <rect x="2" y="30" width="28" height="3" fill="#FFD700"/>
    <rect x="0" y="33" width="32" height="3" fill="#B8860B"/>
  </g>

  <!-- Subtitle -->
  <g transform="translate(200, 360)" font-family="monospace" text-anchor="middle">
    <text y="0" font-size="10" fill="#00ff41" letter-spacing="2">BASE · 2026</text>
  </g>

  <!-- Scanlines for retro CRT feel -->
  <g opacity="0.08">
    <rect x="0" y="0" width="400" height="1" fill="#ffffff"/>
    <rect x="0" y="4" width="400" height="1" fill="#ffffff"/>
    <rect x="0" y="8" width="400" height="1" fill="#ffffff"/>
  </g>
</svg>
